<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Coding Bootcamp">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ADD8"/>
      <stop offset="100%" stop-color="#F7A41D"/>
    </linearGradient>
  </defs>

  <!-- rounded tile -->
  <rect width="32" height="32" rx="7" fill="url(#tile)"/>

  <!-- cap body (peeks out below the board) -->
  <path d="M8 13.7 V18.4 L16 21.8 L24 18.4 V13.7 L16 16.9 Z" fill="#ffffff" opacity="0.9"/>

  <!-- mortarboard -->
  <path d="M16 6 L29 12 L16 18 L3 12 Z" fill="#ffffff"/>

  <!-- tassel -->
  <path d="M16 12 L23 12.7 L23 17.6" fill="none" stroke="#ffffff"
        stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="16" cy="12" r="1.15" fill="#ffffff"/>
  <circle cx="23" cy="18.5" r="1.5" fill="#ffffff"/>
</svg>
